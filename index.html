<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ألعاب gohn 🎮</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
        }
        p {
            color: #aaaaaa;
            font-size: 1.2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn {
            background-color: #00ffcc;
            color: #121212;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #00b38f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>أهلاً بك في موقع ألعاب gohn! 🎮</h1>
        <p>هنا ستجد أروع ألعاب الويب مثل لعبة الثعبان، الذاكرة، والقفز قريباً جداً.</p>
        <a href="#" class="btn">ابدأ اللعب الآن</a>
    </div>
</body>
</html>
