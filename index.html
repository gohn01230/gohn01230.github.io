<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOHN PRO - CLEAN FINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#eef2ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:90px}
.navbar{width:92%;max-width:500px;background:#fff;border-radius:20px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.brand{font-weight:900;color:#3b82f6}
.user-info{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:6px 12px;border-radius:14px;cursor:pointer;position:relative}
.user-avatar{width:32px;height:32px;border-radius:50%}
.coin-badge{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;padding:6px 12px;border-radius:12px;font-weight:900;font-size:.85rem}
.container{width:92%;max-width:500px;margin-top:18px;flex:1}
.main-panel{background:#fff;border-radius:24px;padding:20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.05)}
.btn-3d{width:100%;padding:12px;border:none;border-radius:14px;font-family:'Tajawal';font-weight:900;color:#fff;cursor:pointer;margin-top:10px}
.btn-chat{background:#6366f1}
.btn-games{background:#22c55e}
.btn-danger{background:#ef4444}
.page{display:none}
.page.active{display:block}
.bottom-nav{position:fixed;bottom:12px;width:92%;max-width:420px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:20px;display:flex;justify-content:space-around;padding:8px}
.nav-item{color:#94a3b8;font-size:.7rem;font-weight:800;cursor:pointer;padding:6px 12px;border-radius:12px;text-align:center}
.nav-item.active{color:#fff;background:rgba(255,255,255,.15)}
.chat-box{height:300px;overflow-y:auto;background:#f8fafc;border-radius:12px;padding:10px;margin:10px 0;text-align:right}
.chat-msg{margin-bottom:8px;font-size:.85rem}
.chat-msg b{color:#3b82f6}
.chat-input-area{display:flex;gap:6px}
.chat-input-area input{flex:1;padding:10px;border:1px solid #e2e8f0;border-radius:12px;font-family:'Tajawal'}
.player-item{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:8px;border-radius:12px;margin-bottom:6px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#fff;padding:10px 14px;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,.15);opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="navbar">
<div id="user-summary" class="user-info" style="display:none">
<img id="user-avatar" class="user-avatar" src="">
<span id="user-name">..</span>
</div>
<div class="brand">GOHN PRO</div>
<div id="coin-badge" class="coin-badge" style="display:none">🥕 <span id="user-coins">0</span></div>
</div>

<div class="container">
<div id="view-auth" class="main-panel">
<h2 style="color:#3b82f6;font-weight:900;margin-bottom:10px">مرحبا بك 🪴</h2>
<p style="color:#64748b;margin-bottom:16px">سجل دخولك وابدأ اللعب!</p>
<button id="loginBtn" class="btn-3d btn-chat">دخول بجوجل</button>
<button id="loginBtn2" class="btn-3d btn-games" style="display:none">جرب طريقة تانية</button>
<p id="loginError" style="color:#ef4444;font-size:.8rem;margin-top:10px;display:none"></p>
<p id="loginDebug" style="color:#64748b;font-size:.7rem;margin-top:8px"></p>
</div>

<div id="view-main" style="display:none">
<div class="main-panel">
<div id="page-games" class="page active">
<h3 style="text-align:right;color:#3b82f6;margin-bottom:10px">الالعاب</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<button class="btn-3d btn-games" data-game="xo">❌ اكس او</button>
<button class="btn-3d btn-chat" data-game="tap">⚡ سرعة</button>
<button class="btn-3d btn-games" data-game="rps">✊ حجر ورقة</button>
<button class="btn-3d btn-chat" data-game="space">🚀 فضاء</button>
</div>
</div>

<div id="page-online" class="page">
<h3 style="text-align:right;color:#3b82f6;margin-bottom:8px">المتصلين الان</h3>
<div id="players-list"><p style="color:#64748b;font-size:.8rem">جاري التحميل...</p></div>
</div>

<div id="page-chat" class="page">
<h3 style="text-align:right;color:#6366f1;margin-bottom:8px">الشات العام 💬</h3>
<div id="chat-box" class="chat-box"></div>
<div class="chat-input-area">
<input id="chat-input" type="text" placeholder="اكتب رسالة..." maxlength="200">
<button id="chat-send" class="btn-3d btn-chat" style="width:auto;margin:0;padding:10px 16px">إرسال</button>
</div>
</div>

<div id="page-game" class="page">
<h3 id="game-title">لعبة</h3>
<p id="game-status" style="margin:10px 0;font-weight:800"></p>
<div id="game-board"></div>
<button id="exit-game" class="btn-3d btn-danger">خروج</button>
</div>
</div>
</div>
</div>

<div class="bottom-nav" id="bottom-nav" style="display:none">
<div class="nav-item active" data-tab="games">🕹<br>الالعاب</div>
<div class="nav-item" data-tab="online">⚔<br>اونلاين</div>
<div class="nav-item" data-tab="chat">💬<br>الشات</div>
</div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyA5LlGHl9djJsx_Rs3evjd8Xzpn0e25IHI",
    authDomain: "gohn-games.firebaseapp.com",
    projectId: "gohn-games",
    storageBucket: "gohn-games.firebasestorage.app",
    messagingSenderId: "837388013481",
    appId: "1:837388013481:web:3d1c87fd31442284653eb8"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

var currentUser = null;
var userProfile = {coins:0};
var activeRoomId = null;
var roomListener = null;
var chatListener = null;
var presenceInterval = null;

function showToast(msg){
    var t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

function logDebug(msg){
    var el = document.getElementById("loginDebug");
    if(el) el.innerText = msg;
    console.log(msg);
}

function doLogin(){
    var btn = document.getElementById("loginBtn");
    var err = document.getElementById("loginError");
    var btn2 = document.getElementById("loginBtn2");
    if(btn) { btn.innerText = "جاري..."; btn.disabled = true; }
    if(err) { err.style.display = "none"; }
    logDebug("يحاول تسجيل الدخول...");
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then(function(result){
        logDebug("تم تسجيل الدخول بنجاح");
        if(btn) { btn.innerText = "دخول بجوجل"; btn.disabled = false; }
    }).catch(function(e){
        console.error(e);
        logDebug("خطأ: " + e.code + " - " + e.message);
        if(err){ err.innerText = e.message; err.style.display = "block"; }
        if(btn2){ btn2.style.display = "block"; }
        if(btn){ btn.innerText = "دخول بجوجل"; btn.disabled = false; }
        if(e.code === "auth/unauthorized-domain"){
            if(err){ err.innerText = "الدومين غير مصرح به في Firebase. ضيف gohn01230.github.io في Authorized domains"; err.style.display="block"; }
        }
        if(e.code === "auth/popup-blocked" || e.code === "auth/popup-closed-by-user"){
            showToast("النافذة اتقفلت، جرب الطريقة التانية");
        }
    });
}

function doLoginRedirect(){
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
}

function logoutUser(){
    if(currentUser){
        db.collection("users_profile").doc(currentUser.uid).update({status:"offline"}).then(function(){
            auth.signOut().then(function(){ location.reload(); });
        });
    } else {
        auth.signOut();
    }
}

function switchTab(tab){
    document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
    document.querySelectorAll(".nav-item").forEach(function(n){ n.classList.remove("active"); });
    var page = document.getElementById("page-" + tab);
    if(page) page.classList.add("active");
    var nav = document.querySelector('[data-tab="'+tab+'"]');
    if(nav) nav.classList.add("active");
}

function listenToPlayers(){
    db.collection("users_profile").where("status","==","online").onSnapshot(function(snap){
        var list = document.getElementById("players-list");
        if(!list) return;
        list.innerHTML = "";
        var count = 0;
        snap.forEach(function(doc){
            if(doc.id === currentUser.uid) return;
            var data = doc.data();
            if(Date.now() - (data.lastActiveNum||0) > 180000) return;
            count++;
            var div = document.createElement("div");
            div.className = "player-item";
            var left = document.createElement("div");
            left.style.display = "flex";
            left.style.alignItems = "center";
            left.style.gap = "8px";
            var img = document.createElement("img");
            img.src = data.photoURL || "https://via.placeholder.com/32";
            img.style.width = "28px";
            img.style.height = "28px";
            img.style.borderRadius = "50%";
            var nameSpan = document.createElement("span");
            nameSpan.innerText = data.fullName || "لاعب";
            nameSpan.style.fontSize = ".85rem";
            nameSpan.style.fontWeight = "800";
            left.appendChild(img);
            left.appendChild(nameSpan);
            var btn = document.createElement("button");
            btn.className = "btn-3d btn-games";
            btn.style.width = "auto";
            btn.style.padding = "6px 12px";
            btn.style.margin = "0";
            btn.innerText = "تحدي";
            btn.onclick = (function(id, name){
                return function(){ sendChallenge(id, name); };
            })(doc.id, data.fullName||"لاعب");
            div.appendChild(left);
            div.appendChild(btn);
            list.appendChild(div);
        });
        if(count === 0){
            list.innerHTML = '<p style="color:#64748b;font-size:.8rem;text-align:center;padding:10px">لا أحد متصل الان</p>';
        }
    });
}

function sendChallenge(toId, toName){
    var games = ["xo","tap","rps"];
    var g = games[Math.floor(Math.random()*games.length)];
    db.collection("challenges").add({
        fromId: currentUser.uid,
        fromName: currentUser.displayName || "لاعب",
        toId: toId,
        gameType: g,
        status: "pending",
        timestamp: Date.now()
    }).then(function(){
        showToast("تم ارسال تحدي " + g + " الى " + toName);
    });
}

function listenToChat(){
    if(chatListener) chatListener();
    var box = document.getElementById("chat-box");
    if(!box) return;
    chatListener = db.collection("global_chat").orderBy("timestampNum","desc").limit(30).onSnapshot(function(snap){
        var msgs = [];
        snap.forEach(function(doc){ msgs.push(doc.data()); });
        msgs.reverse();
        if(msgs.length === 0){
            box.innerHTML = '<p style="color:#64748b;text-align:center;padding:20px;font-size:.8rem">لا توجد رسائل</p>';
            return;
        }
        box.innerHTML = "";
        msgs.forEach(function(m){
            var div = document.createElement("div");
            div.className = "chat-msg";
            var b = document.createElement("b");
            b.innerText = (m.userName || "مجهول") + ": ";
            var span = document.createElement("span");
            span.innerText = m.text || "";
            div.appendChild(b);
            div.appendChild(span);
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function sendChat(){
    var input = document.getElementById("chat-input");
    if(!input) return;
    var text = input.value.trim();
    if(!text) return;
    if(!currentUser){ showToast("سجل دخول اولا"); return; }
    db.collection("global_chat").add({
        text: text,
        userId: currentUser.uid,
        userName: currentUser.displayName || "لاعب",
        photoURL: currentUser.photoURL || "",
        timestampNum: Date.now(),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){
        input.value = "";
    }).catch(function(e){
        showToast("خطأ: " + e.message);
    });
}

document.addEventListener("DOMContentLoaded", function(){
    var loginBtn = document.getElementById("loginBtn");
    if(loginBtn) loginBtn.addEventListener("click", doLogin);
    
    var loginBtn2 = document.getElementById("loginBtn2");
    if(loginBtn2) loginBtn2.addEventListener("click", doLoginRedirect);
    
    var userSummary = document.getElementById("user-summary");
    if(userSummary) userSummary.addEventListener("click", function(){ logoutUser(); });
    
    var chatSend = document.getElementById("chat-send");
    if(chatSend) chatSend.addEventListener("click", sendChat);
    
    var chatInput = document.getElementById("chat-input");
    if(chatInput){
        chatInput.addEventListener("keypress", function(e){
            if(e.key === "Enter") sendChat();
        });
    }
    
    var exitBtn = document.getElementById("exit-game");
    if(exitBtn) exitBtn.addEventListener("click", function(){ switchTab("games"); if(roomListener){ roomListener(); roomListener=null; } });
    
    document.querySelectorAll(".nav-item").forEach(function(item){
        item.addEventListener("click", function(){
            var tab = this.getAttribute("data-tab");
            if(tab) switchTab(tab);
        });
    });
    
    document.querySelectorAll("[data-game]").forEach(function(btn){
        btn.addEventListener("click", function(){
            var g = this.getAttribute("data-game");
            showToast("اخترت لعبة " + g + " - روح اونلاين لتحدي اصدقائك");
        });
    });
    
    logDebug("الصفحة جاهزة - اضغط دخول بجوجل");
});

auth.onAuthStateChanged(function(user){
    if(user){
        currentUser = user;
        document.getElementById("view-auth").style.display = "none";
        document.getElementById("view-main").style.display = "block";
        document.getElementById("user-summary").style.display = "flex";
        document.getElementById("coin-badge").style.display = "flex";
        document.getElementById("bottom-nav").style.display = "flex";
        document.getElementById("user-avatar").src = user.photoURL || "https://via.placeholder.com/32";
        document.getElementById("user-name").innerText = (user.displayName || "لاعب").split(" ")[0];
        
        db.collection("users_profile").doc(user.uid).set({
            fullName: user.displayName || "لاعب",
            photoURL: user.photoURL || "",
            status: "online",
            lastActiveNum: Date.now(),
            lastActive: firebase.firestore.FieldValue.serverTimestamp(),
            coins: firebase.firestore.FieldValue.increment(0)
        },{merge:true});
        
        if(presenceInterval) clearInterval(presenceInterval);
        presenceInterval = setInterval(function(){
            if(currentUser){
                db.collection("users_profile").doc(currentUser.uid).update({
                    lastActiveNum: Date.now(),
                    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "online"
                });
            }
        },20000);
        
        db.collection("users_profile").doc(user.uid).onSnapshot(function(doc){
            if(doc.exists){
                userProfile = doc.data();
                var coinEl = document.getElementById("user-coins");
                if(coinEl) coinEl.innerText = userProfile.coins || 0;
            }
        });
        
        listenToPlayers();
        listenToChat();
        
    } else {
        document.getElementById("view-auth").style.display = "block";
        document.getElementById("view-main").style.display = "none";
        document.getElementById("user-summary").style.display = "none";
        document.getElementById("coin-badge").style.display = "none";
        document.getElementById("bottom-nav").style.display = "none";
        logDebug("لم تسجل دخول بعد");
    }
});

auth.getRedirectResult().then(function(result){
    if(result && result.user){
        logDebug("تم الدخول عبر redirect");
    }
}).catch(function(e){
    console.error(e);
    logDebug("خطأ redirect: " + e.message);
});
</script>
</body>
</html>
