<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GOHN CHAT - Discord Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#313338;color:#f2f3f5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{font-family:'Tajawal',sans-serif}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:#313338;display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:#2b2d31;border-radius:8px;padding:32px;width:90%;max-width:400px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.login-card h1{font-weight:900;font-size:1.8rem;margin-bottom:8px;color:#fff}
.login-card p{color:#b5bac1;margin-bottom:20px;font-size:.9rem}
.btn-discord{width:100%;padding:12px;background:#5865f2;color:#fff;border:none;border-radius:4px;font-weight:700;font-size:1rem;cursor:pointer;transition:.2s}
.btn-discord:hover{background:#4752c4}
.btn-discord:disabled{opacity:.6;cursor:not-allowed}

/* DISCORD LAYOUT */
.app{display:flex;height:100vh;width:100vw;display:none}
.app.show{display:flex}

/* Servers sidebar */
.servers-bar{width:72px;background:#1e1f22;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:8px;overflow-y:auto}
.server-icon{width:48px;height:48px;background:#313338;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;transition:.2s;color:#fff;font-weight:900}
.server-icon:hover{border-radius:16px;background:#5865f2}
.server-icon.active{border-radius:16px;background:#5865f2}
.server-divider{width:32px;height:2px;background:#2b2d31;border-radius:1px;margin:4px 0}

/* Channels sidebar */
.channels-bar{width:240px;background:#2b2d31;display:flex;flex-direction:column}
.channels-header{height:48px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1f2124;box-shadow:0 1px 0 #1f2124,0 1.5px 0 #232428,0 2px 0 #2b2d31}
.channels-header h2{font-size:1rem;font-weight:900;color:#fff}
.channels-list{flex:1;padding:8px;overflow-y:auto}
.channel-category{color:#80848e;font-size:.75rem;font-weight:700;margin:16px 0 4px 0;padding:0 8px;letter-spacing:.5px}
.channel-item{padding:6px 8px;border-radius:4px;display:flex;align-items:center;gap:6px;color:#949ba4;cursor:pointer;font-size:.9rem;font-weight:500;margin-bottom:2px}
.channel-item:hover{background:#35373c;color:#f2f3f5}
.channel-item.active{background:#404249;color:#fff}
.channel-item .hash{color:#80848e;font-size:1.1rem}
.channel-item.active .hash{color:#fff}
.add-channel-btn{margin-top:8px;padding:6px 8px;border-radius:4px;border:1px dashed #4e5058;background:transparent;color:#949ba4;font-size:.8rem;cursor:pointer;width:100%}
.add-channel-btn:hover{color:#fff;border-color:#fff}

/* Main chat */
.chat-area{flex:1;display:flex;flex-direction:column;background:#313338;min-width:0}
.chat-header{height:48px;background:#313338;border-bottom:1px solid #1f2124;padding:0 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 0 #1f2124,0 1.5px 0 #232428,0 2px 0 #2b2d31;z-index:2}
.chat-header .hash{color:#80848e;font-size:1.4rem}
.chat-header h3{color:#fff;font-weight:700;font-size:1rem}
.chat-header .topic{color:#b5bac1;font-size:.85rem;margin-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.messages-container{flex:1;overflow-y:auto;padding:16px 0 8px 0;display:flex;flex-direction:column;gap:2px}
.message-group{padding:4px 16px 4px 72px;position:relative;min-height:44px}
.message-group:hover{background:#2e3035}
.message-group .avatar{position:absolute;right:16px;top:4px;width:40px;height:40px;border-radius:50%;object-fit:cover}
.message-author{font-weight:500;color:#fff;font-size:.95rem;display:flex;align-items:center;gap:8px}
.message-author .timestamp{color:#949ba4;font-size:.7rem;font-weight:400}
.message-text{color:#dcdee1;font-size:.9rem;line-height:1.4;white-space:pre-wrap;word-break:break-word;margin-top:2px}
.message-text a{color:#00a8fc}
.message-group.continuation{padding-top:1px;min-height:22px}
.message-group.continuation .avatar{display:none}
.message-group.continuation .message-author{display:none}
.message-actions{position:absolute;left:16px;top:-12px;background:#313338;border:1px solid #3f4147;border-radius:8px;padding:2px;display:none;gap:2px;box-shadow:0 4px 8px rgba(0,0,0,.3)}
.message-group:hover .message-actions{display:flex}
.action-btn{width:28px;height:28px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#b5bac1}
.action-btn:hover{background:#2e3035;color:#fff}
.date-separator{display:flex;align-items:center;gap:12px;padding:8px 16px;margin:8px 0;color:#949ba4;font-size:.7rem;font-weight:700}
.date-separator::before,.date-separator::after{content:"";flex:1;height:1px;background:#3f4147}

/* Input */
.chat-input-area{padding:0 16px 24px 16px;background:#313338}
.chat-input-wrapper{background:#383a40;border-radius:8px;padding:0 12px;display:flex;align-items:flex-end;gap:8px;min-height:44px}
.chat-input-wrapper:focus-within{outline:none}
.chat-input{flex:1;background:transparent;border:none;color:#dcdee1;font-family:'Tajawal';font-size:.95rem;padding:12px 0;resize:none;max-height:120px;outline:none}
.chat-input::placeholder{color:#6d6f78}
.input-actions{display:flex;align-items:center;gap:4px;padding:8px 0}
.input-btn{width:32px;height:32px;border:none;background:transparent;color:#b5bac1;cursor:pointer;border-radius:4px;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.input-btn:hover{color:#fff}
.send-btn{width:32px;height:32px;border-radius:50%;background:#5865f2;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn:hover:not(:disabled){background:#4752c4}

/* Members sidebar */
.members-bar{width:240px;background:#2b2d31;padding:8px;display:flex;flex-direction:column;overflow-y:auto}
.members-category{color:#80848e;font-size:.7rem;font-weight:700;margin:16px 8px 8px 8px}
.member-item{display:flex;align-items:center;gap:10px;padding:4px 8px;border-radius:4px;cursor:pointer;color:#949ba4}
.member-item:hover{background:#35373c;color:#fff}
.member-avatar{width:32px;height:32px;border-radius:50%;position:relative}
.member-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.member-status{position:absolute;bottom:-2px;left:-2px;width:12px;height:12px;background:#23a559;border-radius:50%;border:2px solid #2b2d31}
.member-info{display:flex;flex-direction:column}
.member-name{font-size:.9rem;font-weight:500;color:#949ba4}
.member-item.online .member-name{color:#f2f3f5}
.member-role{font-size:.7rem;color:#80848e}

/* Mobile */
@media(max-width:768px){
  .servers-bar{display:none}
  .members-bar{display:none}
  .channels-bar{position:absolute;inset:0;z-index:10;transform:translateX(100%);transition:.3s}
  .channels-bar.show{transform:translateX(0)}
  .mobile-menu-btn{display:flex !important}
}
.mobile-menu-btn{display:none;width:32px;height:32px;border:none;background:transparent;color:#b5bac1;cursor:pointer;font-size:1.3rem}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#111214;color:#fff;padding:10px 16px;border-radius:4px;font-size:.85rem;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:1000;opacity:0;transition:.3s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a1b1e;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#1e1f22}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>GOHN CHAT</h1>
    <p>ديسكورد عربي كامل - شات صوتي وكتابي مع الأصدقاء</p>
    <button class="btn-discord" id="loginBtn">تسجيل الدخول بجوجل</button>
    <p id="loginError" style="color:#fa777c;font-size:.8rem;margin-top:10px;display:none"></p>
    <p style="color:#80848e;font-size:.7rem;margin-top:16px">بتسجيل دخولك توافق على شروط الاستخدام</p>
  </div>
</div>

<div id="app" class="app">
  <!-- Servers -->
  <div class="servers-bar">
    <div class="server-icon active">G</div>
    <div class="server-divider"></div>
    <div class="server-icon" style="background:#23a559">+</div>
  </div>

  <!-- Channels -->
  <div class="channels-bar" id="channelsBar">
    <div class="channels-header">
      <h2>GOHN PRO</h2>
      <button style="background:transparent;border:none;color:#b5bac1;cursor:pointer">⚙</button>
    </div>
    <div class="channels-list" id="channelsList">
      <div class="channel-category">قنوات نصية</div>
      <div id="textChannels"></div>
      <button class="add-channel-btn" id="addChannelBtn">+ إنشاء قناة</button>
      <div class="channel-category" style="margin-top:20px">قنوات صوتية</div>
      <div class="channel-item"><span class="hash">🔊</span> عام</div>
      <div class="channel-item"><span class="hash">🔊</span> ألعاب</div>
    </div>
    <div style="background:#232428;padding:8px;display:flex;align-items:center;gap:8px">
      <img id="userAvatarSmall" src="" style="width:32px;height:32px;border-radius:50%">
      <div style="flex:1;min-width:0">
        <div id="userNameSmall" style="color:#fff;font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">...</div>
        <div style="color:#23a559;font-size:.7rem">متصل</div>
      </div>
      <button id="logoutBtn" style="background:transparent;border:none;color:#b5bac1;cursor:pointer">⚙</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      <span class="hash">#</span>
      <h3 id="currentChannelName">عام</h3>
      <span class="topic" id="currentChannelTopic">الدردشة العامة - تكلم مع الجميع</span>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <button class="input-btn">😊</button>
        <textarea class="chat-input" id="messageInput" placeholder="أرسل رسالة في #عام" rows="1"></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
      <div style="color:#6d6f78;font-size:.65rem;margin-top:6px;padding-right:4px">اضغط Enter للإرسال، Shift+Enter لسطر جديد</div>
    </div>
  </div>

  <!-- Members -->
  <div class="members-bar">
    <div class="members-category" id="onlineCount">متصل — 0</div>
    <div id="onlineMembersList"></div>
    <div class="members-category" style="margin-top:20px">أوفلاين —</div>
    <div id="offlineMembersList" style="opacity:.5"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyA5LlGHl9djJsx_Rs3evjd8Xzpn0e25IHI",
  authDomain: "gohn-games.firebaseapp.com",
  projectId: "gohn-games",
  storageBucket: "gohn-games.firebasestorage.app",
  messagingSenderId: "837388013481",
  appId: "1:837388013481:web:3d1c87fd31442284653eb8"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

var currentUser=null;
var currentChannelId="general";
var currentChannelName="عام";
var messagesListener=null;
var presenceInterval=null;

function showToast(m){
  var t=document.getElementById("toast");
  t.innerText=m;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},3000);
}

// LOGIN
document.getElementById("loginBtn").addEventListener("click", function(){
  var btn=this;
  btn.innerText="جاري...";
  btn.disabled=true;
  var provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e){
    showToast(e.message);
    btn.innerText="تسجيل الدخول بجوجل";
    btn.disabled=false;
  });
});

auth.onAuthStateChanged(function(user){
  if(user){
    currentUser=user;
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").classList.add("show");
    document.getElementById("userAvatarSmall").src=user.photoURL||"https://via.placeholder.com/40";
    document.getElementById("userNameSmall").innerText=user.displayName||"مستخدم";
    // presence
    db.collection("users_profile").doc(user.uid).set({
      fullName:user.displayName||"مستخدم",
      photoURL:user.photoURL||"",
      status:"online",
      lastActive:firebase.firestore.FieldValue.serverTimestamp(),
      lastActiveNum:Date.now()
    },{merge:true});
    if(presenceInterval) clearInterval(presenceInterval);
    presenceInterval=setInterval(function(){
      if(currentUser) db.collection("users_profile").doc(currentUser.uid).update({
        lastActive:firebase.firestore.FieldValue.serverTimestamp(),
        lastActiveNum:Date.now(),
        status:"online"
      });
    },20000);
    initChannels();
    listenToMembers();
  }else{
    document.getElementById("loginScreen").style.display="flex";
    document.getElementById("app").classList.remove("show");
  }
});

// CHANNELS
function initChannels(){
  var defaultChannels=[
    {id:"general",name:"عام",topic:"الدردشة العامة - تكلم مع الجميع"},
    {id:"games",name:"ألعاب",topic:"نقاشات عن الألعاب والتحديات"},
    {id:"memes",name:"ميمز",topic:"ضحك وهزار 😂"},
    {id:"help",name:"مساعدة",topic:"اطلب المساعدة هنا"}
  ];
  // create if not exist
  defaultChannels.forEach(function(ch){
    db.collection("chat_channels").doc(ch.id).get().then(function(doc){
      if(!doc.exists){
        db.collection("chat_channels").doc(ch.id).set({
          name:ch.name,
          topic:ch.topic,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    });
  });
  // listen
  db.collection("chat_channels").orderBy("createdAt").onSnapshot(function(snap){
    var container=document.getElementById("textChannels");
    container.innerHTML="";
    snap.forEach(function(doc){
      var data=doc.data();
      var item=document.createElement("div");
      item.className="channel-item"+(doc.id===currentChannelId?" active":"");
      item.dataset.id=doc.id;
      item.dataset.name=data.name;
      item.dataset.topic=data.topic||"";
      item.innerHTML='<span class="hash">#</span> '+data.name;
      item.onclick=function(){switchChannel(doc.id,data.name,data.topic||"")};
      container.appendChild(item);
    });
    if(snap.empty){
      // fallback
      defaultChannels.forEach(function(ch){
        var item=document.createElement("div");
        item.className="channel-item"+(ch.id===currentChannelId?" active":"");
        item.dataset.id=ch.id;
        item.innerHTML='<span class="hash">#</span> '+ch.name;
        item.onclick=function(){switchChannel(ch.id,ch.name,ch.topic)};
        container.appendChild(item);
      });
    }
  });
  switchChannel(currentChannelId,currentChannelName,"الدردشة العامة");
}

function switchChannel(id,name,topic){
  currentChannelId=id;
  currentChannelName=name;
  document.getElementById("currentChannelName").innerText=name;
  document.getElementById("currentChannelTopic").innerText=topic||"";
  document.getElementById("messageInput").placeholder="أرسل رسالة في #"+name;
  document.querySelectorAll(".channel-item").forEach(function(el){el.classList.remove("active")});
  var activeEl=document.querySelector('.channel-item[data-id="'+id+'"]');
  if(activeEl) activeEl.classList.add("active");
  document.getElementById("channelsBar").classList.remove("show");
  listenToMessages(id);
}

function listenToMessages(channelId){
  if(messagesListener) messagesListener();
  var container=document.getElementById("messagesContainer");
  container.innerHTML='<div style="padding:20px;text-align:center;color:#949ba4">جاري تحميل الرسائل...</div>';
  messagesListener=db.collection("chat_messages").where("channelId","==",channelId).orderBy("timestampNum","asc").limit(200).onSnapshot(function(snap){
    container.innerHTML="";
    var lastDate="";
    var lastUserId="";
    snap.forEach(function(doc){
      var m=doc.data();
      var date=new Date(m.timestampNum||Date.now());
      var dateStr=date.toLocaleDateString("ar-EG");
      if(dateStr!==lastDate){
        var sep=document.createElement("div");
        sep.className="date-separator";
        sep.innerText=dateStr;
        container.appendChild(sep);
        lastDate=dateStr;
        lastUserId="";
      }
      var isContinuation = m.userId===lastUserId && (Date.now() - (m.timestampNum||0) < 300000);
      var group=document.createElement("div");
      group.className="message-group"+(isContinuation?" continuation":"");
      if(!isContinuation){
        var avatar=document.createElement("img");
        avatar.className="avatar";
        avatar.src=m.photoURL||"https://via.placeholder.com/40";
        group.appendChild(avatar);
        var author=document.createElement("div");
        author.className="message-author";
        var timeStr=date.toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
        author.innerHTML=m.userName+'<span class="timestamp">اليوم في '+timeStr+'</span>';
        group.appendChild(author);
      }
      var text=document.createElement("div");
      text.className="message-text";
      text.innerText=m.text;
      group.appendChild(text);
      // actions
      if(m.userId===currentUser.uid){
        var actions=document.createElement("div");
        actions.className="message-actions";
        var delBtn=document.createElement("button");
        delBtn.className="action-btn";
        delBtn.innerText="🗑";
        delBtn.title="حذف";
        delBtn.onclick=function(){deleteMessage(doc.id)};
        actions.appendChild(delBtn);
        group.appendChild(actions);
      }
      container.appendChild(group);
      lastUserId=m.userId;
    });
    container.scrollTop=container.scrollHeight;
  });
}

function deleteMessage(id){
  if(confirm("حذف الرسالة؟")){
    db.collection("chat_messages").doc(id).delete();
  }
}

// SEND MESSAGE
function sendMessage(){
  var input=document.getElementById("messageInput");
  var text=input.value.trim();
  if(!text) return;
  if(!currentUser) return;
  var btn=document.getElementById("sendBtn");
  btn.disabled=true;
  db.collection("chat_messages").add({
    channelId:currentChannelId,
    text:text,
    userId:currentUser.uid,
    userName:currentUser.displayName||"مستخدم",
    photoURL:currentUser.photoURL||"",
    timestamp:firebase.firestore.FieldValue.serverTimestamp(),
    timestampNum:Date.now()
  }).then(function(){
    input.value="";
    input.style.height="auto";
    btn.disabled=false;
    input.focus();
  }).catch(function(e){
    showToast("فشل الإرسال: "+e.message);
    btn.disabled=false;
  });
}

document.getElementById("sendBtn").addEventListener("click",sendMessage);
document.getElementById("messageInput").addEventListener("keydown",function(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById("messageInput").addEventListener("input",function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,120)+"px";
});

// ADD CHANNEL
document.getElementById("addChannelBtn").addEventListener("click",function(){
  var name=prompt("اسم القناة الجديدة:");
  if(!name) return;
  name=name.trim().replace("#","").toLowerCase();
  if(!name) return;
  var id=name.replace(/\s+/g,"-");
  db.collection("chat_channels").doc(id).set({
    name:name,
    topic:"قناة جديدة",
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    createdBy:currentUser.uid
  }).then(function(){
    showToast("تم إنشاء قناة #"+name);
  });
});

// MEMBERS
function listenToMembers(){
  db.collection("users_profile").where("status","==","online").onSnapshot(function(snap){
    var onlineList=document.getElementById("onlineMembersList");
    var offlineList=document.getElementById("offlineMembersList");
    onlineList.innerHTML="";
    var count=0;
    snap.forEach(function(doc){
      if(Date.now()-(doc.data().lastActiveNum||0)>180000) return;
      count++;
      var p=doc.data();
      var item=document.createElement("div");
      item.className="member-item online";
      item.innerHTML='<div class="member-avatar"><img src="'+(p.photoURL||"https://via.placeholder.com/40")+'"><div class="member-status"></div></div><div class="member-info"><div class="member-name">'+(p.fullName||"مستخدم")+'</div><div class="member-role">متصل</div></div>';
      onlineList.appendChild(item);
    });
    document.getElementById("onlineCount").innerText="متصل — "+count;
  });
}

// Mobile menu
document.getElementById("mobileMenuBtn").addEventListener("click",function(){
  document.getElementById("channelsBar").classList.toggle("show");
});
document.getElementById("logoutBtn").addEventListener("click",function(){
  if(confirm("تسجيل خروج؟")){
    if(currentUser){
      db.collection("users_profile").doc(currentUser.uid).update({status:"offline"}).then(function(){
        auth.signOut();
      });
    }else{
      auth.signOut();
    }
  }
});

// Firestore rules reminder
console.log("Firestore rules needed: allow read, write if request.auth != null for chat_messages, chat_channels, users_profile");
</script>
</body>
</html>
