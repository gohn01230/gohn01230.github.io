<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول | موقع gohn 🚀</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #16221f 0%, #080d0c 100%);
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(25, 25, 25, 0.85);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #00ffcc;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        .btn {
            background: linear-gradient(135deg, #00ffcc 0%, #00b38f 100%);
            color: #121212;
            padding: 12px 28px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            display: inline-block;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.5);
        }
        .user-profile {
            display: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #00ffcc;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        .user-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .user-email {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 20px;
        }
        .logout-btn {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }
        .logout-btn:hover {
            background: #ff3333;
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.5);
        }
    </style>

    <!-- استدعاء مكتبات Firebase (إصدار compat لسهولة الدمج) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="container">
        <h1>بوابة تسجيل الدخول الذكية 🔐</h1>
        
        <!-- زر تسجيل الدخول (يختفي بعد الدخول) -->
        <button id="login-btn" class="btn" onclick="loginWithGoogle()">تسجيل الدخول باستخدام Google 🚀</button>

        <!-- واجهة حساب المستخدم (تظهر بعد تسجيل الدخول بنجاح) -->
        <div id="user-profile" class="user-profile">
            <img id="user-img" class="user-avatar" src="" alt="صورة المستخدم">
            <div id="user-name" class="user-name">اسم المستخدم</div>
            <div id="user-email" class="user-email">البريد الإلكتروني</div>
            <button class="btn logout-btn" onclick="logout()">تسجيل الخروج 🚪</button>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyA5LlGHl9djJsx_Rs3evjd8Xzpn0e25IHI",
            authDomain: "gohn-games.firebaseapp.com",
            projectId: "gohn-games",
            storageBucket: "gohn-games.firebasestorage.app",
            messagingSenderId: "837388013481",
            appId: "1:837388013481:web:3d1c87fd31442284653eb8",
            measurementId: "G-8PBX8E8D15"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // دالة تسجيل الدخول عبر Google (بأسلوب النافذة المنبثقة)
        function loginWithGoogle() {
            auth.signInWithPopup(provider).catch((error) => {
                console.error("حدث خطأ أثناء تسجيل الدخول:", error.message);
                alert("تعذر تسجيل الدخول، يرجى المحاولة مرة أخرى.");
            });
        }

        // دالة تسجيل الخروج
        function logout() {
            auth.signOut().catch((error) => {
                console.error("حدث خطأ أثناء تسجيل الخروج:", error.message);
            });
        }

        // مراقبة حالة تسجيل الدخول وتغيير الواجهة تلقائياً
        auth.onAuthStateChanged((user) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            
            if (user) {
                // المستخدم مسجل دخوله حالياً
                loginBtn.style.display = 'none';
                userProfile.style.display = 'block';
                
                document.getElementById('user-img').src = user.photoURL || 'https://via.placeholder.com/80';
                document.getElementById('user-name').innerText = user.displayName || "مستخدم مجهول";
                document.getElementById('user-email').innerText = user.email || "";
            } else {
                // المستخدم غير مسجل دخوله
                loginBtn.style.display = 'inline-block';
                userProfile.style.display = 'none';
            }
        });
    </script>
</body>
</html>
