<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOHN PRO - Fixed Login</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:100px}
.navbar{width:92%;max-width:500px;background:#fff;border-radius:20px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.brand{font-weight:900;color:#3b82f6}
.container{width:92%;max-width:500px;margin-top:20px}
.main-panel{background:#fff;border-radius:28px;padding:24px 18px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.06)}
.btn-3d{width:100%;padding:14px;border:none;border-radius:16px;font-family:'Tajawal';font-weight:900;color:#fff;cursor:pointer}
.btn-chat{background:#6366f1}
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="navbar"><div class="brand">GOHN PRO</div><div id="user-info" style="display:none"><img id="user-avatar" width="30" style="border-radius:50%"><span id="user-name"></span></div></div>
<div class="container">
<div id="view-auth" class="main-panel">
<h2 style="color:#3b82f6;margin-bottom:10px">مرحبا بك 👋</h2>
<p style="color:#64748b;margin-bottom:20px">سجل دخولك وابدأ اللعب!</p>
<button id="loginBtn" class="btn-3d btn-chat">🚀 دخول بجوجل</button>
<p id="loginError" style="color:#ef4444;font-size:.8rem;margin-top:10px;display:none"></p>
</div>
<div id="view-main" style="display:none" class="main-panel">
<h2>تم تسجيل الدخول بنجاح ✅</h2>
<p id="welcome"></p>
<button onclick="logoutUser()" class="btn-3d" style="background:#ef4444;margin-top:16px">تسجيل خروج</button>
</div>
</div>
<script>
// ===== FIREBASE INIT - لازم قبل اي فانكشن =====
const firebaseConfig = {
    apiKey: "AIzaSyA5LlGHl9djJsx_Rs3evjd8Xzpn0e25IHI",
    authDomain: "gohn-games.firebaseapp.com",
    projectId: "gohn-games",
    storageBucket: "gohn-games.firebasestorage.app",
    messagingSenderId: "837388013481",
    appId: "1:837388013481:web:3d1c87fd31442284653eb8"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ===== FIX 1: خلي الفانكشن GLOBAL بـ window. =====
window.login = async function(){
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    btn.innerText = 'جاري...';
    btn.disabled = true;
    err.style.display='none';
    try{
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
    }catch(e){
        console.error(e);
        // لو popup اتبلوك في الموبايل
        if(e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user'){
            try{ await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }
            catch(e2){ err.innerText = e2.message; err.style.display='block'; }
        }else if(e.code === 'auth/unauthorized-domain'){
            err.innerText = 'الدومين مش متسجل في Firebase > Authorized domains';
            err.style.display='block';
        }else{
            err.innerText = e.message;
            err.style.display='block';
        }
    }finally{
        btn.innerText='🚀 دخول بجوجل';
        btn.disabled=false;
    }
}

window.logoutUser = function(){
    auth.signOut().then(()=>location.reload());
}

// ===== FIX 2: استخدم addEventListener بدل onclick في HTML =====
document.getElementById('loginBtn').addEventListener('click', window.login);

// ===== FIX 3: تابع حالة الدخول =====
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById('view-auth').style.display='none';
        document.getElementById('view-main').style.display='block';
        document.getElementById('welcome').innerText = 'اهلا ' + (user.displayName||'يا بطل');
        document.getElementById('user-info').style.display='flex';
        document.getElementById('user-avatar').src = user.photoURL||'';
        document.getElementById('user-name').innerText = user.displayName||'';
        // حدث التواجد
        db.collection("users_profile").doc(user.uid).set({
            fullName:user.displayName, photoURL:user.photoURL, status:"online", lastActive:Date.now()
        },{merge:true});
    }else{
        document.getElementById('view-auth').style.display='block';
        document.getElementById('view-main').style.display='none';
    }
});

// مهم للـ redirect
auth.getRedirectResult().catch(()=>{});
</script>
</body>
</html>
