<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOHN PRO - منصة الألعاب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: white;
}

.navbar {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.brand { font-weight: 900; font-size: 1.3rem; }

.coin-badge {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    padding: 8px 15px;
    border-radius: 12px;
    font-weight: 900;
}

.admin-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.2);
    padding: 10px 15px;
    border-radius: 12px;
    cursor: pointer;
    display: none;
}

.admin-btn.show { display: block; }

.admin-panel {
    position: fixed;
    top: 0;
    right: -400px;
    width: 350px;
    height: 100vh;
    background: #1a1a2e;
    padding: 20px;
    transition: right 0.3s;
    overflow-y: auto;
    z-index: 1000;
}

.admin-panel.show { right: 0; }

.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-weight: 700; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-family: inherit;
}

.btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    margin: 5px;
    font-family: inherit;
}

.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }

.games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.game-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
}

.game-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.2);
}

.game-icon { font-size: 3rem; margin-bottom: 10px; }
.game-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; }
.game-prize { color: #fbbf24; font-size: 0.9rem; }

.players-list {
    background: rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 15px;
    margin-top: 20px;
}

.player-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    margin: 5px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

/* مطر الجزر */
.carrot-rain {
    position: fixed;
    top: -50px;
    font-size: 2rem;
    animation: fall linear forwards;
    z-index: 9999;
    pointer-events: none;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

.game-container {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
}

canvas {
    width: 100%;
    max-width: 500px;
    border-radius: 12px;
    background: #000;
}

.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.9);
    padding: 15px 25px;
    border-radius: 12px;
    z-index: 10000;
    animation: slideDown 0.3s;
}

@keyframes slideDown {
    from { transform: translateX(-50%) translateY(-100px); }
    to { transform: translateX(-50%) translateY(0); }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">️ لوحة التحكم</button>

<div class="admin-panel" id="adminPanel">
    <h2>لوحة تحكم المالك</h2>
    <button class="btn btn-danger" onclick="toggleAdmin()">إغلاق</button>
    
    <h3 style="margin-top:20px">إضافة لعبة</h3>
    <div class="form-group">
        <label>اسم اللعبة</label>
        <input type="text" id="gameName">
    </div>
    <div class="form-group">
        <label>النوع</label>
        <select id="gameType">
            <option value="offline">أوفلاين</option>
            <option value="online">أونلاين</option>
        </select>
    </div>
    <div class="form-group">
        <label>الجائزة (جزر)</label>
        <input type="number" id="gamePrize" value="30">
    </div>
    <div class="form-group">
        <label>كود اللعبة (HTML)</label>
        <textarea id="gameCode" rows="5"></textarea>
    </div>
    <button class="btn btn-success" onclick="addGame()">إضافة اللعبة</button>
    
    <div id="gamesList" style="margin-top:20px"></div>
    
    <h3 style="margin-top:30px">أوامر الأدمن</h3>
    <button class="btn btn-primary" onclick="startCarrotRain()">🌧️ مطر الجزر</button>
</div>

<div class="navbar">
    <div class="brand">🎮 GOHN PRO</div>
    <div class="coin-badge">🥕 <span id="coins">0</span></div>
</div>

<div id="mainContent">
    <div class="games-grid" id="gamesGrid"></div>
    <div class="players-list" id="playersList"></div>
</div>

<div class="game-container" id="gameContainer" style="display:none">
    <h2 id="gameTitle"></h2>
    <div id="gameContent"></div>
    <button class="btn btn-danger" onclick="exitGame()">خروج من اللعبة</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA5LlGHl9djJsx_Rs3evjd8Xzpn0e25IHI",
    authDomain: "gohn-games.firebaseapp.com",
    projectId: "gohn-games",
    storageBucket: "gohn-games.firebasestorage.app",
    messagingSenderId: "837388013481",
    appId: "1:837388013481:web:3d1c87fd31442284653eb8"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let isAdmin = false;
let currentGame = null;

// تسجيل الدخول
auth.signInAnonymously().then(() => {
    console.log('تم تسجيل الدخول');
});

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        
        // التحقق من الأدمن
        if (user.uid === 'ADMIN_UID_HERE') {
            isAdmin = true;
            document.getElementById('adminBtn').classList.add('show');
        }
        
        loadGames();
        loadPlayers();
    }
});

// تحميل الألعاب
function loadGames() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    
    // ألعاب افتراضية
    const defaultGames = [
        { id: 'space', name: 'معركة الفضاء', icon: '🚀', type: 'offline', prize: 30 },
        { id: 'pvz', name: 'Plants vs Zombies', icon: '🌻', type: 'offline', prize: 25 },
        { id: 'xo', name: 'إكس أو', icon: '❌', type: 'online', prize: 20 },
        { id: 'tap', name: 'حرب السرعة', icon: '⚡', type: 'online', prize: 15 }
    ];
    
    defaultGames.forEach(game => {
        const card = createGameCard(game);
        grid.appendChild(card);
    });
    
    // تحميل الألعاب المخصصة
    db.collection('custom_games').onSnapshot(snapshot => {
        snapshot.forEach(doc => {
            const game = doc.data();
            const card = createGameCard({ ...game, id: doc.id });
            grid.appendChild(card);
        });
    });
}

function createGameCard(game) {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
        <div class="game-icon">${game.icon || '🎮'}</div>
        <div class="game-name">${game.name}</div>
        <div class="game-prize">🥕 ${game.prize} جزرة</div>
    `;
    card.onclick = () => openGame(game);
    return card;
}

function openGame(game) {
    currentGame = game;
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('gameContainer').style.display = 'block';
    document.getElementById('gameTitle').innerText = game.name;
    
    if (game.type === 'offline') {
        // تشغيل اللعبة مباشرة
        if (game.id === 'space') {
            startSpaceGame();
        } else if (game.id === 'pvz') {
            startPVZGame();
        } else if (game.code) {
            document.getElementById('gameContent').innerHTML = game.code;
        }
    } else {
        // لعبة أونلاين - ابحث عن خصم
        findOpponent(game);
    }
}

function exitGame() {
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('gameContainer').style.display = 'none';
    document.getElementById('gameContent').innerHTML = '';
    currentGame = null;
}

// تحميل اللاعبين المتصلين
function loadPlayers() {
    db.collection('players').onSnapshot(snapshot => {
        const list = document.getElementById('playersList');
        list.innerHTML = '<h3>اللاعبين المتصلين</h3>';
        
        snapshot.forEach(doc => {
            const player = doc.data();
            if (doc.id !== currentUser.uid) {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `
                    <span>${player.name || 'لاعب'}</span>
                    <button class="btn btn-primary" onclick="challengePlayer('${doc.id}', '${player.name}')">تحدي ️</button>
                `;
                list.appendChild(item);
            }
        });
    });
    
    // تحديث حالة اللاعب
    db.collection('players').doc(currentUser.uid).set({
        name: 'أنت',
        online: true,
        lastActive: Date.now()
    });
}

function challengePlayer(playerId, playerName) {
    if (!currentGame) {
        alert('اختر لعبة أولاً!');
        return;
    }
    
    // إنشاء تحدي
    db.collection('challenges').add({
        from: currentUser.uid,
        to: playerId,
        game: currentGame,
        status: 'pending',
        timestamp: Date.now()
    });
    
    alert(`تم إرسال تحدي إلى ${playerName}`);
}

function findOpponent(game) {
    alert('جاري البحث عن خصم...');
    // هنا يمكن إضافة منطق البحث عن خصم
}

// لوحة التحكم
function toggleAdmin() {
    document.getElementById('adminPanel').classList.toggle('show');
}

function addGame() {
    const name = document.getElementById('gameName').value;
    const type = document.getElementById('gameType').value;
    const prize = parseInt(document.getElementById('gamePrize').value);
    const code = document.getElementById('gameCode').value;
    
    if (!name || !code) {
        alert('يجب إدخال اسم اللعبة والكود!');
        return;
    }
    
    db.collection('custom_games').add({
        name, type, prize, code,
        createdAt: Date.now()
    }).then(() => {
        alert('تم إضافة اللعبة بنجاح!');
        document.getElementById('gameName').value = '';
        document.getElementById('gameCode').value = '';
    });
}

// مطر الجزر
function startCarrotRain() {
    const carrots = ['🥕', '🥕', '🥕', '', '💎'];
    const count = 50;
    
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const carrot = document.createElement('div');
            carrot.className = 'carrot-rain';
            carrot.innerText = carrots[Math.floor(Math.random() * carrots.length)];
            carrot.style.left = Math.random() * 100 + 'vw';
            carrot.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(carrot);
            
            setTimeout(() => carrot.remove(), 4000);
        }, i * 100);
    }
    
    // إضافة جزر لكل اللاعبين
    db.collection('players').get().then(snapshot => {
        snapshot.forEach(doc => {
            db.collection('players').doc(doc.id).update({
                coins: firebase.firestore.FieldValue.increment(10)
            });
        });
    });
    
    alert('🌧️ تم إرسال مطر الجزر! كل لاعب حصل على 10 جزرات');
}

// لعبة الفضاء
function startSpaceGame() {
    const content = document.getElementById('gameContent');
    content.innerHTML = '<canvas id="spaceCanvas" width="500" height="400"></canvas>';
    
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    
    let player = { x: 250, y: 350 };
    let bullets = [];
    let enemies = [];
    let score = 0;
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        player.x = e.clientX - rect.left;
    });
    
    canvas.addEventListener('click', () => {
        bullets.push({ x: player.x, y: player.y });
    });
    
    function gameLoop() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 500, 400);
        
        // رسم اللاعب
        ctx.fillStyle = '#00f';
        ctx.fillRect(player.x - 20, player.y, 40, 20);
        
        // الرصاص
        bullets = bullets.filter(b => {
            b.y -= 5;
            ctx.fillStyle = '#ff0';
            ctx.fillRect(b.x - 2, b.y, 4, 10);
            return b.y > 0;
        });
        
        // الأعداء
        if (Math.random() < 0.02) {
            enemies.push({ x: Math.random() * 500, y: 0 });
        }
        
        enemies = enemies.filter(e => {
            e.y += 2;
            ctx.fillStyle = '#f00';
            ctx.fillRect(e.x - 15, e.y, 30, 30);
            
            // اصطدام
            bullets.forEach((b, i) => {
                if (Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) {
                    bullets.splice(i, 1);
                    enemies = enemies.filter(en => en !== e);
                    score += 10;
                }
            });
            
            return e.y < 400;
        });
        
        ctx.fillStyle = '#fff';
        ctx.font = '20px Arial';
        ctx.fillText('النقاط: ' + score, 10, 30);
        
        requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
    
    // نهاية اللعبة بعد 30 ثانية
    setTimeout(() => {
        db.collection('players').doc(currentUser.uid).update({
            coins: firebase.firestore.FieldValue.increment(score)
        });
        alert(`انتهت اللعبة! ربحت ${score} جزرة`);
        exitGame();
    }, 30000);
}

// لعبة Plants vs Zombies
function startPVZGame() {
    const content = document.getElementById('gameContent');
    content.innerHTML = '<canvas id="pvzCanvas" width="500" height="400"></canvas>';
    
    const canvas = document.getElementById('pvzCanvas');
    const ctx = canvas.getContext('2d');
    
    let plants = [];
    let zombies = [];
    let sun = 150;
    let score = 0;
    
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // زراعة نبات
        if (sun >= 50) {
            plants.push({ x, y, type: 'sunflower' });
            sun -= 50;
        }
    });
    
    function gameLoop() {
        ctx.fillStyle = '#90EE90';
        ctx.fillRect(0, 0, 500, 400);
        
        // رسم النباتات
        plants.forEach(p => {
            ctx.fillStyle = '#0f0';
            ctx.fillRect(p.x - 20, p.y - 20, 40, 40);
        });
        
        // الزومبي
        if (Math.random() < 0.01) {
            zombies.push({ x: 500, y: Math.random() * 400 });
        }
        
        zombies = zombies.filter(z => {
            z.x -= 1;
            ctx.fillStyle = '#f00';
            ctx.fillRect(z.x - 20, z.y - 20, 40, 40);
            return z.x > 0;
        });
        
        ctx.fillStyle = '#000';
        ctx.font = '20px Arial';
        ctx.fillText('الشمس: ' + sun, 10, 30);
        ctx.fillText('النقاط: ' + score, 10, 60);
        
        requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
    
    setTimeout(() => {
        db.collection('players').doc(currentUser.uid).update({
            coins: firebase.firestore.FieldValue.increment(score)
        });
        alert(`انتهت اللعبة! ربحت ${score} جزرة`);
        exitGame();
    }, 30000);
}
</script>
</body>
</html>
