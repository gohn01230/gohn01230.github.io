<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">منصة GOHN PRO 🎮</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .navbar {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .brand { font-weight: 900; font-size: 1.3rem; color: #667eea; }
        .coin-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); }
        .game-card-image {
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .game-card-info {
            padding: 12px;
            text-align: center;
        }
        .game-card-title {
            font-weight: 900;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            color: white;
        }
        .badge.online { background: #22c55e; }
        .badge.offline { background: #f59e0b; }
        .coming-soon {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px dashed rgba(255,255,255,0.5);
        }
        .admin-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .admin-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: white;
            padding: 30px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
            transition: right 0.3s;
            overflow-y: auto;
            z-index: 1000;
        }
        .admin-panel.show { right: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .game-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-actions { display: flex; gap: 8px; }
        .small-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="admin-btn" onclick="toggleAdmin()">⚙️</div>

<div class="admin-panel" id="adminPanel">
    <h2 style="margin-bottom: 20px;">⚙️ لوحة التحكم</h2>
    
    <div class="form-group">
        <label>اسم الموقع:</label>
        <input type="text" id="siteName" placeholder="منصة GOHN PRO">
        <button class="btn btn-primary" onclick="updateSiteName()" style="margin-top: 5px;">حفظ اسم الموقع</button>
    </div>
    
    <hr style="margin: 20px 0;">
    
    <h3>إضافة لعبة جديدة</h3>
    <div class="form-group">
        <label>اسم اللعبة:</label>
        <input type="text" id="gameName">
    </div>
    <div class="form-group">
        <label>النوع:</label>
        <select id="gameType">
            <option value="online">أونلاين</option>
            <option value="offline">أوفلاين</option>
        </select>
    </div>
    <div class="form-group">
        <label>كود اللعبة (HTML):</label>
        <textarea id="gameCode" rows="5"></textarea>
    </div>
    <button class="btn btn-success" onclick="addGame()">➕ إضافة اللعبة</button>
    
    <div id="gamesList" style="margin-top: 30px;"></div>
    
    <button class="btn btn-danger" onclick="toggleAdmin()" style="margin-top: 20px;">❌ إغلاق</button>
</div>

<div class="container">
    <div class="navbar">
        <div class="brand" id="brandName">GOHN PRO</div>
        <div class="coin-badge">🥕 <span id="coins">0</span></div>
    </div>
    
    <div class="games-grid" id="gamesGrid">
        <!-- Games will be loaded here -->
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA5LlGHl9djJsx_Rs3evjd8Xzpn0e25IHI",
    authDomain: "gohn-games.firebaseapp.com",
    projectId: "gohn-games",
    storageBucket: "gohn-games.firebasestorage.app",
    messagingSenderId: "837388013481",
    appId: "1:837388013481:web:3d1c87fd31442284653eb8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let isAdmin = false;

// Default games
const defaultGames = [
    { id: 'pvz', name: 'Plants vs Zombies', type: 'offline', emoji: '🌻' },
    { id: 'xo', name: 'إكس أو', type: 'online', emoji: '❌' },
    { id: 'tap', name: 'حرب السرعة', type: 'online', emoji: '' },
    { id: 'rps', name: 'حجر ورقة مقص', type: 'online', emoji: '✊' }
];

// Auth
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        if (user.email === "gohngohn099@gmail.com") {
            isAdmin = true;
            document.querySelector('.admin-btn').style.display = 'block';
        }
        loadSiteName();
        loadGames();
    } else {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }
});

// Load site name
function loadSiteName() {
    db.collection("site_settings").doc("main").onSnapshot(doc => {
        if (doc.exists) {
            const name = doc.data().siteName || "منصة GOHN PRO";
            document.getElementById('site-title').innerText = name;
            document.getElementById('brandName').innerText = name.split(' ')[0];
            document.getElementById('siteName').value = name;
        }
    });
}

function updateSiteName() {
    const name = document.getElementById('siteName').value;
    db.collection("site_settings").doc("main").set({
        siteName: name,
        updatedAt: Date.now()
    }, { merge: true });
    alert('✅ تم حفظ اسم الموقع');
}

// Load games
function loadGames() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    
    // Load default games
    defaultGames.forEach(game => {
        grid.appendChild(createGameCard(game));
    });
    
    // Load custom games from Firebase
    db.collection("custom_games").where("status", "==", "active").onSnapshot(snapshot => {
        // Remove existing custom games
        document.querySelectorAll('.custom-game').forEach(el => el.remove());
        
        snapshot.forEach(doc => {
            const game = {
                id: doc.id,
                name: doc.data().name,
                type: doc.data().type,
                emoji: '🎮',
                isCustom: true
            };
            const card = createGameCard(game);
            card.classList.add('custom-game');
            grid.appendChild(card);
        });
        
        // Add coming soon
        const comingSoon = document.createElement('div');
        comingSoon.className = 'game-card coming-soon';
        comingSoon.innerHTML = `
            <div class="game-card-image">???</div>
            <div class="game-card-info">
                <div class="game-card-title">Coming soon...</div>
            </div>
        `;
        grid.appendChild(comingSoon);
    });
}

function createGameCard(game) {
    const div = document.createElement('div');
    div.className = 'game-card';
    div.innerHTML = `
        <div class="game-card-image">${game.emoji}</div>
        <div class="game-card-info">
            <div class="game-card-title">${game.name}</div>
            <span class="badge ${game.type}">${game.type === 'online' ? 'أونلاين ' : 'أوفلاين '}</span>
        </div>
    `;
    
    if (!game.isCustom) {
        div.onclick = () => openGame(game.id);
    }
    
    return div;
}

function openGame(gameId) {
    if (gameId === 'pvz') {
        alert(' Plants vs Zombies - قادمة قريباً!');
    } else if (gameId === 'xo') {
        alert('❌ إكس أو - قادمة قريباً!');
    } else if (gameId === 'tap') {
        alert('⚡ حرب السرعة - قادمة قريباً!');
    } else if (gameId === 'rps') {
        alert('✊ حجر ورقة مقص - قادمة قريباً!');
    }
}

// Admin functions
function toggleAdmin() {
    document.getElementById('adminPanel').classList.toggle('show');
    if (document.getElementById('adminPanel').classList.contains('show')) {
        loadAdminGames();
    }
}

function loadAdminGames() {
    const list = document.getElementById('gamesList');
    list.innerHTML = '<h3>الألعاب المضافة</h3>';
    
    db.collection("custom_games").onSnapshot(snapshot => {
        list.innerHTML = '<h3>الألعاب المضافة</h3>';
        snapshot.forEach(doc => {
            const game = doc.data();
            const item = document.createElement('div');
            item.className = 'game-item';
            item.innerHTML = `
                <div>
                    <strong>${game.name}</strong><br>
                    <small>${game.type === 'online' ? '👥 أونلاين' : '🎮 أوفلاين'}</small>
                </div>
                <div class="game-actions">
                    <button class="small-btn btn-danger" onclick="deleteGame('${doc.id}')">🗑️</button>
                </div>
            `;
            list.appendChild(item);
        });
    });
}

function addGame() {
    const name = document.getElementById('gameName').value;
    const type = document.getElementById('gameType').value;
    const code = document.getElementById('gameCode').value;
    
    if (!name || !code) {
        alert('⚠️ يجب إدخال اسم اللعبة والكود');
        return;
    }
    
    db.collection("custom_games").add({
        name: name,
        type: type,
        code: code,
        status: "active",
        createdAt: Date.now()
    }).then(() => {
        alert('✅ تم إضافة اللعبة بنجاح');
        document.getElementById('gameName').value = '';
        document.getElementById('gameCode').value = '';
    });
}

function deleteGame(gameId) {
    if (confirm('هل أنت متأكد من حذف هذه اللعبة؟')) {
        db.collection("custom_games").doc(gameId).delete().then(() => {
            alert('✅ تم حذف اللعبة');
        });
    }
}
</script>

</body>
</html>
