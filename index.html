<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect 4 - لعبة الأربعة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    font-family: 'Tajawal', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    color: white;
    overflow-x: hidden;
}
.header {
    text-align: center;
    margin-bottom: 15px;
    width: 100%;
    max-width: 500px;
}
.header h1 {
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 5px;
}
.header p { font-size: 0.85rem; opacity: 0.8; }

.controls {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 500px;
}
.mode-btn, .diff-btn {
    padding: 8px 14px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.2s;
}
.mode-btn.active, .diff-btn.active {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    border-color: #fbbf24;
    color: #1e3c72;
}
.mode-btn:hover, .diff-btn:hover { transform: translateY(-2px); }

.scoreboard {
    display: flex;
    justify-content: space-around;
    gap: 10px;
    margin-bottom: 15px;
    width: 100%;
    max-width: 500px;
}
.score-box {
    flex: 1;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    border: 2px solid transparent;
    transition: all 0.3s;
}
.score-box.active-red { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.5); }
.score-box.active-yellow { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.5); }
.score-label { font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px; }
.score-value { font-size: 1.5rem; font-weight: 900; }
.red-dot, .yellow-dot {
    width: 14px; height: 14px; border-radius: 50%;
    display: inline-block; margin-left: 5px; vertical-align: middle;
}
.red-dot { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
.yellow-dot { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }

.status-bar {
    background: rgba(0,0,0,0.3);
    padding: 10px 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    font-weight: 800;
    font-size: 1rem;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 500px;
}

.board-container {
    position: relative;
    background: linear-gradient(135deg, #1e40af, #1e3a8a);
    padding: 12px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.1);
    width: 100%;
    max-width: 420px;
}
.board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}
.cell {
    aspect-ratio: 1;
    background: #0f172a;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
    overflow: hidden;
}
.cell:hover { background: #1e293b; }
.cell.red {
    background: radial-gradient(circle at 35% 35%, #ff6b6b, #dc2626);
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4), 0 0 15px rgba(239,68,68,0.6);
    animation: dropIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cell.yellow {
    background: radial-gradient(circle at 35% 35%, #fde047, #eab308);
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4), 0 0 15px rgba(251,191,36,0.6);
    animation: dropIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cell.winning {
    animation: winPulse 0.8s infinite alternate;
}
@keyframes dropIn {
    0% { transform: translateY(-300px); opacity: 0; }
    60% { transform: translateY(10px); }
    100% { transform: translateY(0); opacity: 1; }
}
@keyframes winPulse {
    from { transform: scale(1); filter: brightness(1); }
    to { transform: scale(1.15); filter: brightness(1.4); }
}

.preview {
    position: absolute;
    top: -40px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    padding: 0 12px;
    pointer-events: none;
}
.preview-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    transform: translateY(10px);
}
.preview-dot.show {
    opacity: 0.6;
    transform: translateY(0);
}
.preview-dot.red { background: radial-gradient(circle at 35% 35%, #ff6b6b, #dc2626); }
.preview-dot.yellow { background: radial-gradient(circle at 35% 35%, #fde047, #eab308); }

.action-btns {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    width: 100%;
    max-width: 500px;
}
.action-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
}
.action-btn:hover { transform: translateY(-2px); }
.action-btn:active { transform: translateY(2px); }
.btn-undo { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }
.btn-reset { background: linear-gradient(135deg, #10b981, #059669); color: white; }
.btn-new { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e3c72; }

.game-over-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.3s;
}
.game-over-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.game-over-box {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    padding: 30px 40px;
    border-radius: 24px;
    text-align: center;
    border: 3px solid rgba(255,255,255,0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
.game-over-box h2 {
    font-size: 2rem;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.game-over-box p { margin-bottom: 20px; opacity: 0.9; }
.game-over-box button {
    padding: 12px 30px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #1e3c72;
    border: none;
    border-radius: 12px;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
}
</style>
</head>
<body>

<div class="header">
    <h1> Connect 4</h1>
    <p>وصّل 4 قطع عشان تكسب!</p>
</div>

<div class="controls">
    <button class="mode-btn active" data-mode="pvp">👥 لاعبين</button>
    <button class="mode-btn" data-mode="pvc">🤖 ضد الكمبيوتر</button>
</div>

<div class="controls" id="diffControls" style="display:none;">
    <button class="diff-btn" data-diff="easy">😊 سهل</button>
    <button class="diff-btn active" data-diff="medium"> متوسط</button>
    <button class="diff-btn" data-diff="hard"> صعب</button>
</div>

<div class="scoreboard">
    <div class="score-box active-red" id="redBox">
        <div class="score-label">الأحمر <span class="red-dot"></span></div>
        <div class="score-value" id="redScore">0</div>
    </div>
    <div class="score-box" id="drawBox">
        <div class="score-label">تعادل</div>
        <div class="score-value" id="drawScore">0</div>
    </div>
    <div class="score-box" id="yellowBox">
        <div class="score-label">الأصفر <span class="yellow-dot"></span></div>
        <div class="score-value" id="yellowScore">0</div>
    </div>
</div>

<div class="status-bar" id="status">دور الأحمر 🔴</div>

<div class="board-container">
    <div class="preview" id="preview"></div>
    <div class="board" id="board"></div>
</div>

<div class="action-btns">
    <button class="action-btn btn-undo" id="undoBtn" onclick="undoMove()">↩ تراجع</button>
    <button class="action-btn btn-reset" onclick="resetBoard()">🔄 جولة جديدة</button>
    <button class="action-btn btn-new" onclick="newGame()">✨ لعبة جديدة</button>
</div>

<div class="game-over-overlay" id="gameOver">
    <div class="game-over-box">
        <h2 id="winnerText">كسب!</h2>
        <p id="winnerSub">مبروك </p>
        <button onclick="closeGameOver()">يلّا نكمل!</button>
    </div>
</div>

<script>
const ROWS = 6, COLS = 7;
let board = [];
let currentPlayer = 1; // 1 = red, 2 = yellow
let gameMode = 'pvp'; // 'pvp' or 'pvc'
let difficulty = 'medium';
let gameOver = false;
let moveHistory = [];
let scores = { 1: 0, 2: 0, draw: 0 };

// DOM
const boardEl = document.getElementById('board');
const previewEl = document.getElementById('preview');
const statusEl = document.getElementById('status');
const redBox = document.getElementById('redBox');
const yellowBox = document.getElementById('yellowBox');
const drawBox = document.getElementById('drawBox');
const gameOverEl = document.getElementById('gameOver');
const winnerText = document.getElementById('winnerText');
const winnerSub = document.getElementById('winnerSub');

function init() {
    // Create preview dots
    previewEl.innerHTML = '';
    for (let c = 0; c < COLS; c++) {
        const dot = document.createElement('div');
        dot.className = 'preview-dot';
        dot.dataset.col = c;
        previewEl.appendChild(dot);
    }
    resetBoard();
}

function resetBoard() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    currentPlayer = 1;
    gameOver = false;
    moveHistory = [];
    renderBoard();
    updateStatus();
    gameOverEl.classList.remove('show');
}

function newGame() {
    scores = { 1: 0, 2: 0, draw: 0 };
    updateScores();
    resetBoard();
}

function renderBoard() {
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.row = r;
            cell.dataset.col = c;
            if (board[r][c] === 1) cell.classList.add('red');
            else if (board[r][c] === 2) cell.classList.add('yellow');
            cell.addEventListener('click', () => handleCellClick(c));
            cell.addEventListener('mouseenter', () => showPreview(c));
            cell.addEventListener('mouseleave', hidePreview);
            boardEl.appendChild(cell);
        }
    }
}

function showPreview(col) {
    if (gameOver) return;
    if (gameMode === 'pvc' && currentPlayer === 2) return;
    const dots = previewEl.children;
    for (let i = 0; i < dots.length; i++) {
        dots[i].classList.remove('show', 'red', 'yellow');
    }
    const dot = dots[col];
    dot.classList.add('show');
    dot.classList.add(currentPlayer === 1 ? 'red' : 'yellow');
}

function hidePreview() {
    const dots = previewEl.children;
    for (let i = 0; i < dots.length; i++) {
        dots[i].classList.remove('show', 'red', 'yellow');
    }
}

function handleCellClick(col) {
    if (gameOver) return;
    if (gameMode === 'pvc' && currentPlayer === 2) return;
    makeMove(col);
}

function makeMove(col) {
    const row = getAvailableRow(col);
    if (row === -1) return;
    
    board[row][col] = currentPlayer;
    moveHistory.push({ row, col, player: currentPlayer });
    
    renderBoard();
    
    // Animate the dropped piece
    const cell = boardEl.children[row * COLS + col];
    cell.style.animation = 'none';
    setTimeout(() => { cell.style.animation = ''; }, 10);
    
    const winResult = checkWin(row, col);
    if (winResult) {
        gameOver = true;
        highlightWin(winResult);
        scores[currentPlayer]++;
        updateScores();
        setTimeout(() => showGameOver(currentPlayer), 600);
        return;
    }
    
    if (checkDraw()) {
        gameOver = true;
        scores.draw++;
        updateScores();
        setTimeout(() => showGameOver(0), 400);
        return;
    }
    
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    updateStatus();
    
    // AI move
    if (gameMode === 'pvc' && currentPlayer === 2 && !gameOver) {
        setTimeout(aiMove, 500);
    }
}

function getAvailableRow(col) {
    for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][col] === 0) return r;
    }
    return -1;
}

function checkWin(row, col) {
    const player = board[row][col];
    const directions = [[0,1],[1,0],[1,1],[1,-1]];
    
    for (const [dr, dc] of directions) {
        const cells = [[row, col]];
        for (let i = 1; i < 4; i++) {
            const r = row + dr * i, c = col + dc * i;
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
                cells.push([r, c]);
            } else break;
        }
        for (let i = 1; i < 4; i++) {
            const r = row - dr * i, c = col - dc * i;
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
                cells.push([r, c]);
            } else break;
        }
        if (cells.length >= 4) return cells;
    }
    return null;
}

function checkDraw() {
    return board[0].every(c => c !== 0);
}

function highlightWin(cells) {
    cells.forEach(([r, c]) => {
        const cell = boardEl.children[r * COLS + c];
        cell.classList.add('winning');
    });
}

function updateStatus() {
    if (currentPlayer === 1) {
        statusEl.innerHTML = 'دور الأحمر 🔴';
        redBox.classList.add('active-red');
        yellowBox.classList.remove('active-yellow');
    } else {
        statusEl.innerHTML = gameMode === 'pvc' ? 'الكمبيوتر بيفكر... 🤔' : 'دور الأصفر 🟡';
        yellowBox.classList.add('active-yellow');
        redBox.classList.remove('active-red');
    }
}

function updateScores() {
    document.getElementById('redScore').textContent = scores[1];
    document.getElementById('yellowScore').textContent = scores[2];
    document.getElementById('drawScore').textContent = scores.draw;
}

function showGameOver(winner) {
    if (winner === 0) {
        winnerText.textContent = 'تعادل! 🤝';
        winnerSub.textContent = 'مفيش فايز الجولة دي';
    } else if (winner === 1) {
        winnerText.textContent = 'الأحمر كسب! ';
        winnerSub.textContent = 'مبروك 🎉';
    } else {
        winnerText.textContent = gameMode === 'pvc' ? 'الكمبيوتر كسب! 🤖' : 'الأصفر كسب! 🏆';
        winnerSub.textContent = gameMode === 'pvc' ? 'حاول تاني 💪' : 'مبروك ';
    }
    gameOverEl.classList.add('show');
}

function closeGameOver() {
    gameOverEl.classList.remove('show');
    resetBoard();
}

function undoMove() {
    if (moveHistory.length === 0 || gameOver) return;
    const last = moveHistory.pop();
    board[last.row][last.col] = 0;
    currentPlayer = last.player;
    renderBoard();
    updateStatus();
}

// ===== AI =====
function aiMove() {
    if (gameOver) return;
    let col;
    if (difficulty === 'easy') {
        col = getRandomMove();
    } else if (difficulty === 'medium') {
        col = Math.random() < 0.6 ? getBestMove(2) : getRandomMove();
    } else {
        col = getBestMove(4);
    }
    if (col !== -1) makeMove(col);
}

function getRandomMove() {
    const available = [];
    for (let c = 0; c < COLS; c++) {
        if (board[0][c] === 0) available.push(c);
    }
    return available.length > 0 ? available[Math.floor(Math.random() * available.length)] : -1;
}

function getBestMove(depth) {
    let bestScore = -Infinity;
    let bestCol = -1;
    const available = getAvailableCols();
    
    // Prefer center
    available.sort((a, b) => Math.abs(a - 3) - Math.abs(b - 3));
    
    for (const col of available) {
        const row = getAvailableRow(col);
        board[row][col] = 2;
        const score = minimax(board, depth - 1, -Infinity, Infinity, false);
        board[row][col] = 0;
        if (score > bestScore) {
            bestScore = score;
            bestCol = col;
        }
    }
    return bestCol;
}

function minimax(board, depth, alpha, beta, isMaximizing) {
    const winner = getWinner();
    if (winner === 2) return 100000 + depth;
    if (winner === 1) return -100000 - depth;
    if (checkDraw()) return 0;
    if (depth === 0) return evaluateBoard();
    
    const available = getAvailableCols();
    
    if (isMaximizing) {
        let maxEval = -Infinity;
        for (const col of available) {
            const row = getAvailableRow(col);
            board[row][col] = 2;
            const eval_ = minimax(board, depth - 1, alpha, beta, false);
            board[row][col] = 0;
            maxEval = Math.max(maxEval, eval_);
            alpha = Math.max(alpha, eval_);
            if (beta <= alpha) break;
        }
        return maxEval;
    } else {
        let minEval = Infinity;
        for (const col of available) {
            const row = getAvailableRow(col);
            board[row][col] = 1;
            const eval_ = minimax(board, depth - 1, alpha, beta, true);
            board[row][col] = 0;
            minEval = Math.min(minEval, eval_);
            beta = Math.min(beta, eval_);
            if (beta <= alpha) break;
        }
        return minEval;
    }
}

function getWinner() {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c] !== 0 && checkWin(r, c)) return board[r][c];
        }
    }
    return 0;
}

function getAvailableCols() {
    const cols = [];
    for (let c = 0; c < COLS; c++) {
        if (board[0][c] === 0) cols.push(c);
    }
    return cols;
}

function evaluateBoard() {
    let score = 0;
    // Center column preference
    const centerCol = 3;
    for (let r = 0; r < ROWS; r++) {
        if (board[r][centerCol] === 2) score += 3;
        else if (board[r][centerCol] === 1) score -= 3;
    }
    // Evaluate windows
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (c + 3 < COLS) {
                const window = [board[r][c], board[r][c+1], board[r][c+2], board[r][c+3]];
                score += evaluateWindow(window);
            }
            if (r + 3 < ROWS) {
                const window = [board[r][c], board[r+1][c], board[r+2][c], board[r+3][c]];
                score += evaluateWindow(window);
            }
            if (r + 3 < ROWS && c + 3 < COLS) {
                const window = [board[r][c], board[r+1][c+1], board[r+2][c+2], board[r+3][c+3]];
                score += evaluateWindow(window);
            }
            if (r + 3 < ROWS && c - 3 >= 0) {
                const window = [board[r][c], board[r+1][c-1], board[r+2][c-2], board[r+3][c-3]];
                score += evaluateWindow(window);
            }
        }
    }
    return score;
}

function evaluateWindow(window) {
    let score = 0;
    const aiCount = window.filter(x => x === 2).length;
    const humanCount = window.filter(x => x === 1).length;
    const emptyCount = window.filter(x => x === 0).length;
    
    if (aiCount === 3 && emptyCount === 1) score += 50;
    else if (aiCount === 2 && emptyCount === 2) score += 10;
    
    if (humanCount === 3 && emptyCount === 1) score -= 80;
    else if (humanCount === 2 && emptyCount === 2) score -= 10;
    
    return score;
}

// ===== Mode & Difficulty =====
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        gameMode = btn.dataset.mode;
        document.getElementById('diffControls').style.display = gameMode === 'pvc' ? 'flex' : 'none';
        newGame();
    });
});

document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.diff;
        newGame();
    });
});

// Start
init();
</script>

</body>
</html>
